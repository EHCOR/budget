name: budget_tracker
description: "A simplified Flutter budget tracking app."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core functionality
  file_picker: ^10.3.3
  csv: ^5.0.2
  fl_chart: ^0.65.0
  intl: ^0.18.1
  provider: ^6.0.5
  shared_preferences: ^2.2.0  # Replaces path_provider for web compatibility

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true